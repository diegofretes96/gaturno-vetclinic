<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Iniciar sesión – VetClinic</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#1a2332 0%,#243044 50%,#1D9E75 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#fff;border-radius:16px;padding:40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{text-align:center;margin-bottom:28px}.lic{width:60px;height:60px;background:#1D9E75;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;color:#fff;margin-bottom:10px}
.tit{font-size:22px;font-weight:800;color:#1e293b}.sub{font-size:13px;color:#94a3b8;margin-top:4px}
label{font-size:12.5px;font-weight:700;color:#475569;display:block;margin-bottom:4px;margin-top:14px}
.iw{position:relative}.iw i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:15px}
.iw input{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 14px 10px 38px;font-size:13.5px;font-family:'Nunito';outline:none;transition:.15s;color:#1e293b}
.iw input:focus{border-color:#1D9E75;box-shadow:0 0 0 3px rgba(29,158,117,.12)}
.btn{width:100%;background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:800;font-family:'Nunito';cursor:pointer;margin-top:20px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{background:#0F6E56}
.err{background:#FCEBEB;color:#a32d2d;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:7px}
</style></head><body>
<div class="box">
  <div class="logo"><div class="lic"><i class="bi bi-heart-pulse-fill"></i></div><div class="tit">VetClinic</div><div class="sub">Sistema de Gestión Veterinaria</div></div>
  {% if form.errors %}<div class="err"><i class="bi bi-x-circle-fill"></i> Usuario o contraseña incorrectos.</div>{% endif %}
  <form method="post">{% csrf_token %}
    <label for="id_username">Usuario</label>
    <div class="iw"><i class="bi bi-person-fill"></i>{{ form.username }}</div>
    <label for="id_password">Contraseña</label>
    <div class="iw"><i class="bi bi-lock-fill"></i>{{ form.password }}</div>
    <button type="submit" class="btn"><i class="bi bi-box-arrow-in-right"></i> Ingresar al sistema</button>
  </form>
</div></body></html>
